<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AquaCrop AI Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; }
    textarea { width: 100%; height: 120px; }
    pre { background: #f5f5f5; padding: 12px; overflow:auto; }
    button { padding: 10px 14px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>AquaCrop AI Demo</h1>

  <p>Prompt:</p>
  <textarea id="prompt">Run maize in Mitchell County, GA, planted January 5 2026, irrigated</textarea>
  <br/>
  <button id="runBtn">Run</button>

  <h3>Result</h3>
  <pre id="out">(waiting...)</pre>

  <script>
    const BACKEND_BASE = "https://aquacrop-backend-private.onrender.com";

    document.getElementById("runBtn").addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value.trim();
      const out = document.getElementById("out");
      out.textContent = "Running... (Render may cold-start)";

      try {
        const resp = await fetch(`${BACKEND_BASE}/run`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await resp.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = "Error: " + (e?.message || String(e));
      }
    });
  </script>
</body>
</html>
